<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Palette: Ivory #FAF8F3, Charcoal #33393B, Sage #9CB6A3, Powder Blue #A7C4D9, Clay Blush #E3B7A0, Warm Taupe #C9C0B3 -->

  <rect width="1200" height="300" fill="#FAF8F3"/>

  <!-- top accent bar, flat sage -->
  <rect x="0" y="0" width="1200" height="6" fill="#9CB6A3"/>

  <!-- shield icon -->
  <g transform="translate(70,72)">
    <path d="M60 0 L118 22 V70 C118 108 92 136 60 150 C28 136 2 108 2 70 V22 Z"
          fill="none" stroke="#9CB6A3" stroke-width="5"/>
    <path d="M40 76 L54 90 L86 54" fill="none" stroke="#33393B" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="215" y="118" font-family="'Space Grotesk', Arial, Helvetica, sans-serif" font-size="46"
        font-weight="700" fill="#33393B">NIST CSF 2.0 GRC Assessment</text>

  <!-- Subtitle -->
  <text x="217" y="155" font-family="'Inter', Arial, Helvetica, sans-serif" font-size="21"
        fill="#8a8378">Log(N) Pacific &#8212; Gap Assessment &#183; Risk Register &#183; Incident Response Plan</text>

  <!-- Function pills -->
  <g font-family="'Inter', Arial, Helvetica, sans-serif" font-size="16" font-weight="700">
    <!-- GOVERN -->
    <rect x="217" y="196" width="118" height="38" rx="19" fill="#FFFFFF" stroke="#A7C4D9" stroke-width="1.5"/>
    <text x="276" y="220" fill="#33393B" text-anchor="middle">GOVERN</text>

    <!-- IDENTIFY -->
    <rect x="347" y="196" width="128" height="38" rx="19" fill="#FFFFFF" stroke="#A7C4D9" stroke-width="1.5"/>
    <text x="411" y="220" fill="#33393B" text-anchor="middle">IDENTIFY</text>

    <!-- PROTECT -->
    <rect x="487" y="196" width="122" height="38" rx="19" fill="#FFFFFF" stroke="#A7C4D9" stroke-width="1.5"/>
    <text x="548" y="220" fill="#33393B" text-anchor="middle">PROTECT</text>

    <!-- DETECT -->
    <rect x="621" y="196" width="112" height="38" rx="19" fill="#FFFFFF" stroke="#E3B7A0" stroke-width="1.5"/>
    <text x="677" y="220" fill="#33393B" text-anchor="middle">DETECT</text>

    <!-- RESPOND -->
    <rect x="745" y="196" width="126" height="38" rx="19" fill="#FFFFFF" stroke="#E3B7A0" stroke-width="1.5"/>
    <text x="808" y="220" fill="#33393B" text-anchor="middle">RESPOND</text>

    <!-- RECOVER -->
    <rect x="883" y="196" width="122" height="38" rx="19" fill="#FFFFFF" stroke="#E3B7A0" stroke-width="1.5"/>
    <text x="944" y="220" fill="#33393B" text-anchor="middle">RECOVER</text>
  </g>

  <!-- right-side credential card -->
  <g transform="translate(1015,60)" font-family="'Inter', Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="130" height="180" rx="10" fill="#FFFFFF" stroke="#C9C0B3" stroke-width="1.5"/>
    <text x="65" y="34" font-size="13" fill="#a39a8d" text-anchor="middle" letter-spacing="1">ASSESSOR</text>
    <text x="65" y="60" font-size="17" fill="#33393B" text-anchor="middle" font-weight="700">Chau Pham</text>
    <text x="65" y="82" font-size="13" fill="#7fa392" text-anchor="middle" font-weight="700">CISSP</text>
    <text x="65" y="122" font-size="12" fill="#a39a8d" text-anchor="middle">76+ CONTROLS</text>
    <text x="65" y="144" font-size="12" fill="#a39a8d" text-anchor="middle">20-ENTRY</text>
    <text x="65" y="162" font-size="12" fill="#a39a8d" text-anchor="middle">RISK REGISTER</text>
  </g>
</svg>
